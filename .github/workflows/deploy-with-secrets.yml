# ══════════════════════════════════════════════════════════════════════════
# GITHUB ACTIONS WORKFLOW - Secure API Key Deployment
# Save this as: .github/workflows/deploy.yml
# ══════════════════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages with Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Inject API keys into app.js
        run: |
          # Replace placeholder with actual API key from GitHub Secrets
          sed -i "s/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" app.js
          sed -i "s/VISION_API_KEY_PLACEHOLDER/${{ secrets.GOOGLE_VISION_API_KEY }}/g" app.js
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ══════════════════════════════════════════════════════════════════════════
# SETUP INSTRUCTIONS:
#
# 1. Create this file in your repo at: .github/workflows/deploy.yml
#
# 2. Update your app.js to use placeholders instead of real keys:
#    Line 7:  GEMINI_API_KEY: 'GEMINI_API_KEY_PLACEHOLDER',
#    Line 11: GOOGLE_VISION_API_KEY: 'VISION_API_KEY_PLACEHOLDER'
#
# 3. Add secrets to GitHub:
#    - Go to: https://github.com/YOUR_USERNAME/beyondpayroll-hcm/settings/secrets/actions
#    - Click "New repository secret"
#    - Name: GEMINI_API_KEY
#    - Value: AIzaSyDXwV2U1XaQScpZ8d1CKxrOCJ2o397rF7s
#    - Click "Add secret"
#    - Repeat for GOOGLE_VISION_API_KEY
#
# 4. Commit and push:
#    git add .github/workflows/deploy.yml app.js
#    git commit -m "Add secure deployment workflow"
#    git push
#
# 5. GitHub Actions will automatically:
#    - Replace placeholders with real keys
#    - Deploy to GitHub Pages
#    - Keys NEVER appear in your repo
# ══════════════════════════════════════════════════════════════════════════
